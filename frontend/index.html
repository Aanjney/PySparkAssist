<!DOCTYPE html>
<html class="light" lang="en" x-cloak x-data="chatApp()" :class="{ 'dark': darkMode }">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
    <title>PySparkAssist</title>
    <link rel="icon" href="favicon.svg?v=1" type="image/svg+xml"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "spark-orange": "#E25A1C",
                    "spark-blue": { DEFAULT: "#012456", dark: "#4a7cc9" },
                    "surface": { DEFAULT: "#f8f9fa", dark: "#121212" },
                    "surface-container-lowest": { DEFAULT: "#ffffff", dark: "#1e1e1e" },
                    "surface-container-low": { DEFAULT: "#f1f4f6", dark: "#252525" },
                    "surface-container": { DEFAULT: "#eaeff1", dark: "#2c2c2c" },
                    "surface-container-high": { DEFAULT: "#e2e9ec", dark: "#333333" },
                    "surface-container-highest": { DEFAULT: "#dbe4e7", dark: "#3a3a3a" },
                    "on-surface": { DEFAULT: "#2b3437", dark: "#e0e0e0" },
                    "on-surface-variant": { DEFAULT: "#586064", dark: "#a0a0a0" },
                    "primary-container": { DEFAULT: "#fff0e6", dark: "#3d1e08" },
                    "on-primary-container": { DEFAULT: "#401705", dark: "#ffccb3" },
                    "secondary-container": { DEFAULT: "#e5e1e6", dark: "#333036" },
                    "on-secondary-container": { DEFAULT: "#525155", dark: "#cac5cb" },
                    "inverse-surface": "#0c0f10",
                    "surface-variant": "#dbe4e7",
                    "outline": "#737c7f",
                    "outline-variant": "#abb3b7",
                    "primary": "#E25A1C",
                    "primary-dim": "#c44a15",
                    "on-primary": "#ffffff",
                    "error": "#9e3f4e",
                },
                fontFamily: {
                    headline: ["Manrope", "sans-serif"],
                    body: ["Inter", "sans-serif"],
                },
            },
        },
    }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css"/>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/python.min.js"></script>
    <link rel="stylesheet" href="styles.css?v=13"/>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="layout-root bg-surface dark:bg-surface-dark text-on-surface dark:text-on-surface-dark flex flex-col font-body">

    <!-- Nav — in-flow flex child, NOT fixed -->
    <nav class="nav-safe flex-shrink-0 relative z-50 bg-white/70 dark:bg-[#1e1e1e]/70 backdrop-blur-xl border-b border-outline-variant/10">
        <!-- Single row: title shrink-0; usage pill w-fit (never flex-grow); icons. Narrow = compact usage label via app.js. -->
        <div class="flex flex-nowrap items-center justify-between gap-2 sm:gap-4 min-h-14 h-14 w-full max-w-screen-2xl mx-auto px-4 sm:px-6">
            <span class="font-headline text-sm sm:text-xl md:text-2xl font-bold tracking-tighter shrink-0">
                <span class="text-spark-blue dark:text-spark-blue-dark">Py</span><span class="text-spark-orange">Spark</span><span class="text-spark-blue dark:text-spark-blue-dark">Assist</span>
            </span>
            <div class="flex items-center gap-1.5 sm:gap-3 shrink-0 min-w-0">
                <button type="button" @click="showUsagePanel = !showUsagePanel"
                    class="inline-flex w-fit items-center gap-1 sm:gap-1.5 px-2 sm:px-3 py-1.5 rounded-full text-[10px] sm:text-xs font-medium transition-colors"
                    :class="usageColor()">
                    <span class="w-2 h-2 rounded-full animate-pulse shrink-0" :class="usageDotColor()" x-show="!groqUsage"></span>
                    <span class="w-2 h-2 rounded-full shrink-0" :class="usageDotColor()" x-show="groqUsage"></span>
                    <span class="sm:hidden truncate min-w-0" x-text="usageBadgeTextCompact()"></span>
                    <span class="hidden sm:inline truncate min-w-0" x-text="usageBadgeText()"></span>
                </button>
                <div class="flex items-center gap-1 sm:gap-2 shrink-0">
                    <button type="button" @click="toggleDarkMode()" class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-full hover:bg-surface-container dark:hover:bg-surface-container-dark transition-colors">
                        <span class="material-symbols-outlined text-on-surface-variant dark:text-on-surface-variant-dark text-[22px] sm:text-2xl" x-text="darkMode ? 'light_mode' : 'dark_mode'"></span>
                    </button>
                    <a href="https://github.com/Aanjney/PySparkAssist" target="_blank" rel="noopener"
                       class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-full hover:bg-surface-container dark:hover:bg-surface-container-dark transition-colors"
                       title="View on GitHub">
                        <svg class="w-[18px] h-[18px] sm:w-5 sm:h-5 text-on-surface-variant dark:text-on-surface-variant-dark" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                    </a>
                </div>
            </div>
        </div>
        <div x-show="showUsagePanel && groqUsage" x-transition @click.outside="showUsagePanel = false"
            class="absolute left-3 right-3 top-full mt-0.5 sm:left-auto sm:right-6 sm:w-[230px] bg-surface-container-lowest dark:bg-surface-container-lowest-dark rounded-lg p-2.5 shadow-lg shadow-on-surface/5 text-xs space-y-1">
            <div class="flex justify-between gap-3 tabular-nums"><span class="text-on-surface-variant dark:text-on-surface-variant-dark">Requests today</span><span x-text="groqUsage?.remaining_requests != null ? groqUsage.remaining_requests + '/' + (groqUsage?.limit_requests ?? '') : '—'"></span></div>
            <div class="flex justify-between gap-3 tabular-nums"><span class="text-on-surface-variant dark:text-on-surface-variant-dark">Tokens / min</span><span x-text="groqUsage?.remaining_tokens != null ? formatNumber(groqUsage.remaining_tokens) + '/' + formatNumber(groqUsage.limit_tokens) : '—'"></span></div>
            <div class="flex justify-between gap-3 pt-0.5 border-t border-outline-variant/20"><span class="text-on-surface-variant dark:text-on-surface-variant-dark">Resets in</span><span class="text-right font-medium tabular-nums" x-text="countdownText()"></span></div>
            <p x-show="groqUsageUpdatedAt" class="text-[10px] text-on-surface-variant dark:text-on-surface-variant-dark text-right pt-0.5" x-text="groqUsageUpdatedAt ? groqUsageUpdatedAt.toLocaleTimeString() : ''"></p>
        </div>
    </nav>

    <!-- Main — fills remaining viewport height -->
    <main class="flex-1 flex flex-col items-center min-h-0 px-4 sm:px-6">
        <div class="w-full max-w-4xl flex flex-col flex-1 min-h-0">
            <div class="flex-1 flex flex-col min-h-0"
                 :class="messages.length === 0 ? 'items-center justify-center pb-16' : ''">

                <!-- Welcome (empty state) -->
                <header x-show="messages.length === 0" class="text-center mb-10">
                    <h1 class="font-headline text-3xl sm:text-5xl font-extrabold tracking-tighter mb-4 px-1">
                        <span class="text-spark-blue dark:text-spark-blue-dark">Py</span><span class="text-spark-orange">Spark</span><span class="text-spark-blue dark:text-spark-blue-dark">Assist</span>
                    </h1>
                    <p class="text-on-surface-variant dark:text-on-surface-variant-dark text-lg">
                        Get your PySpark queries answered from the official documentation
                    </p>
                </header>

                <!-- Scrollable messages (chat state) -->
                <div x-show="messages.length > 0" x-ref="chatArea"
                     class="flex-1 min-h-0 overflow-y-auto no-scrollbar space-y-8 px-2 pb-4 pt-4">
                    <template x-for="(msg, idx) in messages" :key="idx">
                        <div>
                            <div x-show="msg.role === 'user'" class="flex justify-end">
                                <div class="bg-primary-container dark:bg-primary-container-dark text-on-primary-container dark:text-on-primary-container-dark px-6 py-4 rounded-xl max-w-[80%]">
                                    <p class="text-base font-medium whitespace-pre-wrap" x-text="msg.content"></p>
                                </div>
                            </div>
                            <div x-show="msg.role === 'assistant'" class="flex justify-start">
                                <div class="bg-surface-container-lowest dark:bg-surface-container-lowest-dark p-4 sm:p-6 rounded-xl max-w-[90%] flex gap-3 sm:gap-5 overflow-hidden">
                                    <div class="flex-shrink-0 w-8 h-8 bg-spark-blue dark:bg-[#4a7cc9] rounded-lg flex items-center justify-center mt-1">
                                        <span class="material-symbols-outlined text-spark-orange text-sm" style='font-variation-settings: "FILL" 1;'>bolt</span>
                                    </div>
                                    <div class="flex-1 min-w-0 space-y-3">
                                        <div class="prose-spark text-on-surface dark:text-on-surface-dark text-base leading-relaxed"
                                             x-html="msg.renderedHtml"></div>
                                        <div x-show="msg.sources && msg.sources.length > 0 && !msg.streaming" x-data="{ open: false }" class="mt-4">
                                            <button @click="open = !open"
                                                class="flex items-center gap-1.5 text-xs font-medium text-on-surface-variant dark:text-on-surface-variant-dark uppercase tracking-wide hover:text-on-surface dark:hover:text-on-surface-dark transition-colors">
                                                <span class="material-symbols-outlined text-sm transition-transform duration-200" :class="open ? 'rotate-180' : ''">expand_more</span>
                                                <span x-text="'Sources (' + (msg.sources?.length || 0) + ')'"></span>
                                            </button>
                                            <div x-show="open" x-transition class="mt-2 space-y-2">
                                                <template x-for="(src, si) in (msg.sources || [])" :key="si">
                                                    <div class="bg-surface-container dark:bg-surface-container-dark rounded-lg px-4 py-3 text-sm">
                                                        <div class="flex items-start gap-2.5">
                                                            <span class="material-symbols-outlined text-base mt-0.5 flex-shrink-0"
                                                                  :class="src.content_type === 'code_example' ? 'text-spark-blue dark:text-[#4a7cc9]' : 'text-spark-orange'"
                                                                  x-text="src.content_type === 'code_example' ? 'code' : 'description'"></span>
                                                            <div class="flex-1 min-w-0">
                                                                <div class="flex items-center gap-1.5 flex-wrap">
                                                                    <a x-show="src.url" :href="src.url" target="_blank" rel="noopener"
                                                                       class="font-medium hover:underline text-spark-orange" x-text="src.title"></a>
                                                                    <span x-show="!src.url" class="font-medium text-on-surface dark:text-on-surface-dark" x-text="src.title"></span>
                                                                    <template x-for="v in (src.versions || [])" :key="v">
                                                                        <span class="source-badge" x-text="v"></span>
                                                                    </template>
                                                                </div>
                                                                <p class="text-on-surface-variant dark:text-on-surface-variant-dark mt-0.5 text-[11px]"
                                                                   x-text="'via ' + (src.match_type === 'knowledge_graph' ? 'semantic search + knowledge graph' : 'semantic search')"></p>
                                                            </div>
                                                            <a x-show="src.url" :href="src.url" target="_blank" rel="noopener"
                                                               class="flex-shrink-0 text-on-surface-variant dark:text-on-surface-variant-dark hover:text-on-surface dark:hover:text-on-surface-dark mt-0.5">
                                                                <span class="material-symbols-outlined text-sm">open_in_new</span>
                                                            </a>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                    <div x-show="isStreaming" class="flex justify-start items-center gap-2 pl-14">
                        <div class="w-2 h-2 bg-spark-orange rounded-full animate-pulse"></div>
                        <span class="text-sm text-on-surface-variant dark:text-on-surface-variant-dark font-medium">Curating a response...</span>
                    </div>
                </div>

                <!-- Input (single instance — centered in empty state, pinned at bottom in chat state) -->
                <div class="w-full composer-pad" :class="messages.length > 0 ? 'flex-shrink-0 pt-3 bg-surface dark:bg-surface-dark' : ''">
                    <form @submit.prevent="sendMessage()" class="relative group">
                        <div class="bg-surface-container-high dark:bg-surface-container-high-dark rounded-2xl w-full p-2 pl-4 sm:pl-6 flex items-center gap-2 sm:gap-4 transition-all duration-300 focus-within:bg-surface-container-lowest dark:focus-within:bg-surface-container-lowest-dark focus-within:shadow-[0_40px_60px_-15px_rgba(43,52,55,0.08)]">
                            <textarea x-model="input" :disabled="isStreaming"
                                x-ref="inputArea"
                                @keydown.enter="if (!$event.shiftKey) { $event.preventDefault(); sendMessage(); }"
                                @input="autoResize($event)"
                                @focus="onComposerFocus()"
                                rows="1"
                                class="composer-textarea bg-transparent border-none focus:ring-0 flex-1 text-on-surface dark:text-on-surface-dark text-[15px] sm:text-lg placeholder:text-on-surface-variant/60 dark:placeholder:text-on-surface-variant-dark/60 font-medium py-2.5 sm:py-3 resize-none overflow-y-auto min-w-0 leading-normal"
                                style="max-height: 150px"
                                placeholder="Ask about PySpark"></textarea>
                            <div class="flex items-center pr-2 shrink-0">
                                <button type="submit" :disabled="isStreaming || !input.trim()"
                                    class="w-12 h-12 bg-gradient-to-br from-spark-orange to-spark-blue text-white rounded-full flex items-center justify-center transition-transform hover:scale-105 active:scale-95 shadow-lg shadow-spark-orange/20 disabled:opacity-50 disabled:cursor-not-allowed">
                                    <span class="material-symbols-outlined">send</span>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js?v=23"></script>
</body>
</html>
